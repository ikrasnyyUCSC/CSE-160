<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vector Drawing</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <br/>
    <label>x1: <input type="number" id="x1" value="2.25"/></label>
    <label>y1: <input type="number" id="y1" value="2.25"/></label>
    <br/>
    <label>x2: <input type="number" id="x2" value="2.25"/></label>
    <label>y2: <input type="number" id="y2" value="2.25"/></label>
    <br/>
    <input type="button" id="drawBtn" value="Draw" onclick="handleDrawEvent()"/>

    <br/><br/>
    <label>Operation:
      <select id="operation">
        <option value="add">Add</option>
        <option value="sub">Sub</option>
        <option value="mul">Mul</option>
        <option value="div">Div</option>
        <option value="magnitude">Magnitude</option>
        <option value="normalize">Normalize</option>
        <option value="angleBetween">Angle Between</option>
        <option value="area">Area</option>
      </select>
    </label>
    <label>Scalar: <input type="number" id="scalar" value="1"/></label>
    <input type="button" id="drawOpBtn" value="Draw Operation" onclick="handleDrawOperationEvent()"/>

  </body>
  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</html>
